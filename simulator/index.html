<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Defender Dashboard Simulator</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=DM+Sans:wght@400;500;600;700&display=swap');

  :root {
    --bg: #0a0a0c;
    --panel-bg: #111114;
    --panel-border: #1e1e24;
    --text: #e0e0e6;
    --text-dim: #6a6a78;
    --toggle-bg: #1a1a22;
    --section-bg: #0e0e12;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    overflow: hidden;
  }

  .simulator { display: flex; width: 100vw; height: 100vh; }

  /* ── Preview Panel ───────────────────────────────────── */

  .preview-panel {
    flex: 0 0 auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background: #050507;
    border-right: 1px solid var(--panel-border);
    min-width: 380px;
  }

  .preview-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 12px;
  }

  .screen-frame {
    position: relative;
    width: 320px;
    height: 533px;
    border: 2px solid #222228;
    border-radius: 8px;
    overflow: hidden;
    background: #000;
    box-shadow: 0 0 60px rgba(0,0,0,0.8), 0 0 2px rgba(255,255,255,0.03);
  }

  .screen-viewport {
    width: 480px;
    height: 800px;
    transform: scale(0.6667);
    transform-origin: top left;
    position: relative;
    overflow: hidden;
  }

  .screen-slider {
    display: flex;
    width: 960px;
    height: 800px;
    transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .screen-page {
    width: 480px;
    height: 800px;
    flex-shrink: 0;
    background: #000;
    position: relative;
  }

  .screen-nav {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 12px;
  }

  .nav-arrow {
    background: none;
    border: 1px solid #333;
    color: var(--text-dim);
    width: 28px;
    height: 28px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }
  .nav-arrow:hover { border-color: #555; color: var(--text); }

  .ext-dot {
    width: 6px; height: 6px; border-radius: 3px;
    background: #333; transition: all 0.3s;
  }
  .ext-dot.active { width: 18px; background: var(--text); }

  /* ── Dashboard Icon Grid ─────────────────────────────── */

  .dash-icon {
    position: absolute;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.25s ease;
  }

  .dash-icon img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    image-rendering: auto;
  }

  /* Color tinting for white-on-transparent icons */
  .dash-icon[data-color="red"] img {
    filter: brightness(0) saturate(100%) invert(12%) sepia(95%) saturate(7400%) hue-rotate(0deg) brightness(115%) contrast(115%);
  }
  .dash-icon[data-color="amber"] img {
    filter: brightness(0) saturate(100%) invert(62%) sepia(98%) saturate(1200%) hue-rotate(1deg) brightness(105%) contrast(101%);
  }
  .dash-icon[data-color="blue"] img {
    filter: brightness(0) saturate(100%) invert(42%) sepia(98%) saturate(2000%) hue-rotate(190deg) brightness(115%) contrast(101%);
  }
  .dash-icon[data-color="green"] img {
    filter: brightness(0) saturate(100%) invert(55%) sepia(98%) saturate(5000%) hue-rotate(85deg) brightness(115%) contrast(115%);
  }

  /* Gear display */
  .gear-display {
    position: absolute;
    left: 0; width: 480px;
    top: 296px; height: 180px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .gear-letter {
    height: 122px;
  }

  .gear-letter img {
    height: 100%;
    width: auto;
    object-fit: contain;
    image-rendering: auto;
  }

  @keyframes gearOutLeft { to { transform: translateX(-40px); opacity: 0; } }
  @keyframes gearOutRight { to { transform: translateX(40px); opacity: 0; } }
  @keyframes gearInLeft { from { transform: translateX(40px); opacity: 0; } }
  @keyframes gearInRight { from { transform: translateX(-40px); opacity: 0; } }

  /* Nav dots inside screen */
  .dash-nav-dots {
    position: absolute;
    bottom: 12px; left: 0; width: 480px;
    display: flex; justify-content: center;
    gap: 8px; align-items: center;
  }
  .dash-dot {
    height: 6px; border-radius: 3px;
    background: #333; transition: all 0.3s;
  }
  .dash-dot.active { width: 18px; background: white; }
  .dash-dot:not(.active) { width: 6px; }

  /* ── Status Screen ───────────────────────────────────── */

  .status-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px;
    font-weight: 600;
    color: white;
    padding: 20px 24px 12px;
    border-bottom: 1px solid #222;
    letter-spacing: 1px;
  }

  .status-rows { padding: 8px 0; }

  .status-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 24px;
    border-bottom: 1px solid #161616;
  }

  .status-row-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px; color: #888; letter-spacing: 0.5px;
  }

  .status-row-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px; font-weight: 600; color: white;
  }

  /* ── Control Panel ───────────────────────────────────── */

  .control-panel {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .panel-header {
    display: flex; align-items: center; gap: 12px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--panel-border);
  }
  .panel-header h1 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px; font-weight: 600;
    letter-spacing: 1px; text-transform: uppercase;
  }
  .panel-header .badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px; letter-spacing: 1px; padding: 3px 8px;
    border-radius: 3px; background: #1a1a22;
    color: var(--text-dim); text-transform: uppercase;
  }

  .section {
    background: var(--section-bg);
    border: 1px solid var(--panel-border);
    border-radius: 6px; overflow: hidden;
  }
  .section-header {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 2px;
    text-transform: uppercase; color: var(--text-dim);
    padding: 12px 16px 8px;
    border-bottom: 1px solid var(--panel-border);
  }
  .section-body { padding: 12px 16px; }

  /* Icon toggles */
  .icon-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4px;
  }
  .icon-toggle {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 8px; border-radius: 4px;
    cursor: pointer; transition: background 0.15s;
    user-select: none;
  }
  .icon-toggle:hover { background: #1a1a22; }

  .toggle-switch {
    width: 32px; height: 16px; border-radius: 8px;
    background: var(--toggle-bg); position: relative;
    flex-shrink: 0; transition: background 0.2s;
    border: 1px solid #2a2a32;
  }
  .toggle-switch::after {
    content: ''; position: absolute;
    width: 12px; height: 12px; border-radius: 50%;
    background: #555; top: 1px; left: 1px;
    transition: all 0.2s;
  }
  .toggle-switch.on { border-color: #3a6a3a; }
  .toggle-switch.on::after { left: 17px; }
  .toggle-switch.on[data-color="red"] { background: #3a1a1a; border-color: #6a2a2a; }
  .toggle-switch.on[data-color="red"]::after { background: #ff0000; }
  .toggle-switch.on[data-color="amber"] { background: #3a2a0a; border-color: #6a4a1a; }
  .toggle-switch.on[data-color="amber"]::after { background: #ffa500; }
  .toggle-switch.on[data-color="blue"] { background: #0a2a3a; border-color: #1a4a6a; }
  .toggle-switch.on[data-color="blue"]::after { background: #0099ff; }
  .toggle-switch.on[data-color="green"] { background: #0a3a1a; border-color: #1a6a2a; }
  .toggle-switch.on[data-color="green"]::after { background: #00ff00; }

  .toggle-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; color: var(--text-dim);
  }
  .icon-toggle.active .toggle-label { color: var(--text); }

  /* Gear buttons */
  .gear-buttons { display: flex; gap: 4px; }
  .gear-btn {
    flex: 1; padding: 10px 0;
    background: var(--toggle-bg);
    border: 1px solid #2a2a32; border-radius: 4px;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px; font-weight: 700;
    cursor: pointer; transition: all 0.15s;
  }
  .gear-btn:hover { border-color: #444; color: var(--text); }
  .gear-btn.active {
    background: #1a1a2a; border-color: white;
    color: white; box-shadow: 0 0 12px rgba(255,255,255,0.1);
  }

  /* Status inputs */
  .status-inputs {
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
  }
  .status-field { display: flex; flex-direction: column; gap: 3px; }
  .status-field label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px; letter-spacing: 0.5px;
    text-transform: uppercase; color: var(--text-dim);
  }
  .status-field input, .status-field select {
    background: var(--toggle-bg);
    border: 1px solid #2a2a32; border-radius: 3px;
    color: var(--text); padding: 6px 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px; outline: none;
  }
  .status-field input:focus { border-color: #555; }

  /* Preset buttons */
  .preset-buttons { display: flex; gap: 6px; flex-wrap: wrap; }
  .preset-btn {
    padding: 7px 14px; background: var(--toggle-bg);
    border: 1px solid #2a2a32; border-radius: 4px;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 0.5px;
    text-transform: uppercase; cursor: pointer;
    transition: all 0.15s;
  }
  .preset-btn:hover { border-color: #555; color: var(--text); background: #1a1a22; }
  .preset-btn.danger { border-color: #3a1a1a; }
  .preset-btn.danger:hover { border-color: #6a2a2a; background: #1a0a0a; color: #ff0000; }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #2a2a32; border-radius: 3px; }
</style>
</head>
<body>

<div class="simulator">
  <div class="preview-panel">
    <div class="preview-label">480 × 800 &nbsp;·&nbsp; ESP32-S3 Preview</div>
    <div class="screen-frame">
      <div class="screen-viewport">
        <div class="screen-slider" id="screenSlider">
          <div class="screen-page" id="dashScreen">
            <div id="iconContainer"></div>
            <div class="gear-display" id="gearDisplay">
              <div class="gear-letter" id="gearLetter"><img src="icons/letter.p.png" alt="P"></div>
            </div>
            <div class="dash-nav-dots" id="dashDots"></div>
          </div>
          <div class="screen-page" id="statusScreen">
            <div class="status-title">VEHICLE STATUS</div>
            <div class="status-rows" id="statusRows"></div>
            <div class="dash-nav-dots" id="statusDots"></div>
          </div>
        </div>
      </div>
    </div>
    <div class="screen-nav">
      <button class="nav-arrow" onclick="switchScreen(0)">‹</button>
      <div class="ext-dot active" id="extDot0"></div>
      <div class="ext-dot" id="extDot1"></div>
      <button class="nav-arrow" onclick="switchScreen(1)">›</button>
    </div>
  </div>

  <div class="control-panel">
    <div class="panel-header">
      <h1>CAN Bus Simulator</h1>
      <span class="badge">Defender Puma</span>
    </div>
    <div class="section">
      <div class="section-header">Presets</div>
      <div class="section-body">
        <div class="preset-buttons">
          <button class="preset-btn" onclick="presetAllOn()">All On</button>
          <button class="preset-btn" onclick="presetAllOff()">All Off</button>
          <button class="preset-btn" onclick="presetDriveMode()">Drive Mode</button>
          <button class="preset-btn" onclick="presetChargeMode()">Charge Mode</button>
          <button class="preset-btn danger" onclick="presetFaultMode()">Fault Mode</button>
        </div>
      </div>
    </div>
    <div class="section">
      <div class="section-header">Gear Selector</div>
      <div class="section-body"><div class="gear-buttons" id="gearButtons"></div></div>
    </div>
    <div class="section">
      <div class="section-header">Warning Lights</div>
      <div class="section-body"><div class="icon-grid" id="iconToggles"></div></div>
    </div>
    <div class="section">
      <div class="section-header">Vehicle Status Data</div>
      <div class="section-body"><div class="status-inputs" id="statusInputs"></div></div>
    </div>
  </div>
</div>

<script>
/*
 * Icon definitions - positions match the Figma design exactly.
 * Using the actual Figma-exported PNG images.
 *
 * Layout reference (480x800 portrait):
 *   Rows 0-2:  y ~25 to ~280  (top icon grid)
 *   Gear:      y ~296 to ~476 (center)
 *   Rows 3-6:  y ~490 to ~760 (bottom icon grid)
 */

const ICONS = [
  // Row 0: top row - wide spacing, only 2 icons
  { id: 'hvil',         name: 'HVIL',           color: 'red',   file: 'hvil.png',           x: 24, y: 25,  w: 84, h: 63 },
  { id: 'cup_heat',     name: 'Cup Heat',       color: 'amber', file: 'cup.and.heat.waves 1.png', x: 375, y: 20, w: 68, h: 68 },

  // Row 1
  { id: 'pbrake_slash', name: 'PBrake Slash',   color: 'red',   file: 'parkingsign.brakesignal.slash.png', x: 24, y: 115, w: 84, h: 75 },
  { id: 'seatbelt',     name: 'Seatbelt',       color: 'red',   file: 'figure.seated.seatbelt.png',        x: 145, y: 110, w: 50, h: 72 },
  { id: 'parking_light',name: 'Parking Light',  color: 'blue',  file: 'parkinglight.png',                  x: 245, y: 120, w: 78, h: 55 },
  { id: 'hazard',       name: 'Hazard',         color: 'red',   file: 'hazardsign.png',                    x: 370, y: 115, w: 52, h: 47 },

  // Row 2
  { id: 'pbrake',       name: 'Parking Brake',  color: 'red',   file: 'parkingsign.brakesignal.png',       x: 24, y: 210, w: 84, h: 57 },
  { id: 'ev_charger',   name: 'EV Charger',     color: 'amber', file: 'ev.charger.png',                    x: 142, y: 205, w: 69, h: 65 },
  { id: 'high_beam',    name: 'High Beam',      color: 'green', file: 'headlight.high.beam.png',           x: 240, y: 210, w: 72, h: 49 },
  { id: 'brake_warn',   name: 'Brake Warning',  color: 'red',   file: 'exclamationmark.brakesignal.png',   x: 365, y: 210, w: 84, h: 57 },

  // Row 3 (below gear)
  { id: 'abs',          name: 'ABS',            color: 'amber', file: 'abs.brakesignal.png',               x: 24, y: 492, w: 84, h: 57 },
  { id: 'engine',       name: 'Engine',         color: 'red',   file: 'engine.combustion.png',             x: 135, y: 498, w: 85, h: 53 },
  { id: 'battery_12v',  name: '12V Battery',    color: 'red',   file: 'minus.plus.batteryblock.png',       x: 255, y: 498, w: 70, h: 54 },
  { id: 'ccs2',         name: 'CCS2 Charger',   color: 'blue',  file: 'charge.ccs2.png',                   x: 365, y: 490, w: 86, h: 64 },

  // Row 4
  { id: 'traction',     name: 'Traction Ctrl',  color: 'amber', file: 'traction.control.tirepressure.png', x: 30, y: 587, w: 60, h: 58 },
  { id: 'thermo_hot',   name: 'Thermo Hot',     color: 'red',   file: 'thermometer.hot.png',               x: 145, y: 582, w: 62, h: 74 },
  { id: 'thermo_cold',  name: 'Thermo Cold',    color: 'blue',  file: 'thermometer.cold.png',              x: 265, y: 582, w: 62, h: 74 },
  { id: 'book_wrench',  name: 'Book & Wrench',  color: 'amber', file: 'book.and.wrench.png',               x: 365, y: 590, w: 86, h: 63 },

  // Row 5: HV battery warnings + balance
  { id: 'hv_warn1',     name: 'HV Batt Warn 1', color: 'amber', file: 'hv.batteryblock.warning.png',       x: 130, y: 680, w: 86, h: 67 },
  { id: 'hv_warn2',     name: 'HV Batt Warn 2', color: 'amber', file: 'hv.batteryblock.warning-1.png',     x: 275, y: 680, w: 86, h: 67 },

  // Row 6: arrows + balance
  { id: 'batt_balance', name: 'Batt Balance',   color: 'amber', file: 'battery.balance.png',               x: 130, y: 680, w: 86, h: 67 },
  { id: 'arrow_left',   name: 'Arrow Left',     color: 'amber', file: 'arrow.small. left.png',             x: 218, y: 700, w: 14, h: 16 },
  { id: 'arrow_right',  name: 'Arrow Right',    color: 'amber', file: 'arrow.small.right.png',             x: 253, y: 700, w: 14, h: 16 },
];

// ── State ─────────────────────────────────────────────────────────

const state = {
  icons: {},
  gear: 'P',
  screen: 0,
  status: {
    soc: 86.6, voltage: 394.4, current: 8.7,
    tempFront: 28, tempRear: 25, voltageDelta: 0.08,
    cellBalance: 'Good', chargeCycles: 150, health: 95,
    maxDischargeCurrent: 60, range: 320,
    lastCharged: '2023-10-01', nextMaint: '2024-04-01',
    firmware: 'v2.3.1'
  }
};
ICONS.forEach(i => state.icons[i.id] = false);

// ── Build Dashboard ───────────────────────────────────────────────

function buildDashboard() {
  const container = document.getElementById('iconContainer');

  ICONS.forEach(icon => {
    const div = document.createElement('div');
    div.className = 'dash-icon';
    div.id = `dash-${icon.id}`;
    div.style.left = icon.x + 'px';
    div.style.top = icon.y + 'px';
    div.style.width = icon.w + 'px';
    div.style.height = icon.h + 'px';
    div.style.opacity = 0.15;
    div.setAttribute('data-color', icon.color);

    const img = document.createElement('img');
    img.src = `icons/${icon.file}`;
    img.alt = icon.name;
    img.draggable = false;
    div.appendChild(img);

    container.appendChild(div);
  });

  // Nav dots
  ['dashDots', 'statusDots'].forEach(id => {
    const el = document.getElementById(id);
    for (let i = 0; i < 2; i++) {
      const dot = document.createElement('div');
      dot.className = 'dash-dot';
      el.appendChild(dot);
    }
  });
  updateDots();
}

// ── Build Controls ────────────────────────────────────────────────

function buildControls() {
  const grid = document.getElementById('iconToggles');
  ICONS.forEach(icon => {
    const t = document.createElement('div');
    t.className = 'icon-toggle';
    t.id = `toggle-${icon.id}`;
    t.innerHTML = `<div class="toggle-switch" data-color="${icon.color}"></div><span class="toggle-label">${icon.name}</span>`;
    t.onclick = () => toggleIcon(icon.id);
    grid.appendChild(t);
  });

  const gearDiv = document.getElementById('gearButtons');
  'PRNDS'.split('').forEach(g => {
    const btn = document.createElement('button');
    btn.className = 'gear-btn' + (g === 'P' ? ' active' : '');
    btn.textContent = g;
    btn.id = `gear-${g}`;
    btn.onclick = () => setGear(g);
    gearDiv.appendChild(btn);
  });

  const statusDiv = document.getElementById('statusInputs');
  [
    { key: 'soc', label: 'SOC (%)', type: 'number', step: 0.1 },
    { key: 'voltage', label: 'Voltage (V)', type: 'number', step: 0.1 },
    { key: 'current', label: 'Current (A)', type: 'number', step: 0.1 },
    { key: 'tempFront', label: 'Temp Front (°C)', type: 'number', step: 1 },
    { key: 'tempRear', label: 'Temp Rear (°C)', type: 'number', step: 1 },
    { key: 'voltageDelta', label: 'V Delta (V)', type: 'number', step: 0.01 },
    { key: 'cellBalance', label: 'Cell Balance', type: 'text' },
    { key: 'chargeCycles', label: 'Charge Cycles', type: 'number', step: 1 },
    { key: 'health', label: 'Health (%)', type: 'number', step: 1 },
    { key: 'maxDischargeCurrent', label: 'Max Discharge (A)', type: 'number', step: 1 },
    { key: 'range', label: 'Range (km)', type: 'number', step: 1 },
    { key: 'lastCharged', label: 'Last Charged', type: 'date' },
    { key: 'nextMaint', label: 'Next Maint', type: 'date' },
    { key: 'firmware', label: 'Firmware', type: 'text' },
  ].forEach(f => {
    const div = document.createElement('div');
    div.className = 'status-field';
    div.innerHTML = `<label>${f.label}</label><input type="${f.type}" value="${state.status[f.key]}" ${f.step ? `step="${f.step}"` : ''} data-key="${f.key}">`;
    div.querySelector('input').oninput = e => {
      state.status[f.key] = f.type === 'number' ? parseFloat(e.target.value) || 0 : e.target.value;
      updateStatusScreen();
    };
    statusDiv.appendChild(div);
  });
}

// ── Build Status Screen ───────────────────────────────────────────

const STATUS_FIELDS = [
  ['soc', 'STATE OF CHARGE', v => v.toFixed(1) + '%'],
  ['voltage', 'BATTERY VOLTAGE', v => v.toFixed(1) + 'V'],
  ['current', 'BATTERY CURRENT', v => v.toFixed(1) + 'A'],
  ['tempFront', 'BATTERY TEMP FRONT', v => v + '°C'],
  ['tempRear', 'BATTERY TEMP REAR', v => v + '°C'],
  ['voltageDelta', 'BATTERY PACK VOLTAGE DELTA', v => v.toFixed(2) + 'V'],
  ['cellBalance', 'CELL BALANCE', v => v],
  ['chargeCycles', 'CHARGE CYCLES', v => v],
  ['health', 'BATTERY HEALTH', v => v + '%'],
  ['maxDischargeCurrent', 'MAX DISCHARGE CURRENT', v => v + 'A'],
  ['range', 'ESTIMATED REMAINING RANGE', v => v + '  km'],
  ['lastCharged', 'LAST CHARGED DATE', v => v],
  ['nextMaint', 'NEXT MAINTENANCE DUE', v => v],
  ['firmware', 'FIRMWARE VERSION', v => v],
];

function buildStatusScreen() {
  const rows = document.getElementById('statusRows');
  STATUS_FIELDS.forEach(([key, label, fmt]) => {
    const row = document.createElement('div');
    row.className = 'status-row';
    row.innerHTML = `<span class="status-row-label">${label}</span><span class="status-row-value" id="sv-${key}">${fmt(state.status[key])}</span>`;
    rows.appendChild(row);
  });
}

function updateStatusScreen() {
  STATUS_FIELDS.forEach(([key, , fmt]) => {
    const el = document.getElementById(`sv-${key}`);
    if (el) el.textContent = fmt(state.status[key]);
  });
}

// ── Icon Control ──────────────────────────────────────────────────

function toggleIcon(id) {
  state.icons[id] = !state.icons[id];
  updateIcon(id);
}

function setIconState(id, on) {
  state.icons[id] = on;
  updateIcon(id);
}

function updateIcon(id) {
  const on = state.icons[id];
  const dashEl = document.getElementById(`dash-${id}`);
  const toggleEl = document.getElementById(`toggle-${id}`);
  if (dashEl) dashEl.style.opacity = on ? 1.0 : 0.15;
  if (toggleEl) {
    toggleEl.querySelector('.toggle-switch').classList.toggle('on', on);
    toggleEl.classList.toggle('active', on);
  }
}

// ── Gear Selector ─────────────────────────────────────────────────

function setGear(g) {
  if (g === state.gear) return;
  const gears = 'PRNDS';
  const goingRight = gears.indexOf(g) > gears.indexOf(state.gear);

  document.querySelectorAll('.gear-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`gear-${g}`).classList.add('active');

  const el = document.getElementById('gearLetter');
  el.style.animation = `gearOut${goingRight ? 'Left' : 'Right'} 0.2s ease-in forwards`;

  setTimeout(() => {
    el.querySelector('img').src = `icons/letter.${g.toLowerCase()}.png`;
    el.querySelector('img').alt = g;
    el.style.animation = `gearIn${goingRight ? 'Left' : 'Right'} 0.2s ease-out forwards`;
    setTimeout(() => el.style.animation = '', 200);
  }, 180);

  state.gear = g;
}

// ── Screen Navigation ─────────────────────────────────────────────

function switchScreen(idx) {
  state.screen = idx;
  document.getElementById('screenSlider').style.transform = `translateX(-${idx * 480}px)`;
  document.getElementById('extDot0').className = 'ext-dot' + (idx === 0 ? ' active' : '');
  document.getElementById('extDot1').className = 'ext-dot' + (idx === 1 ? ' active' : '');
  updateDots();
}

function updateDots() {
  ['dashDots', 'statusDots'].forEach(id => {
    const dots = document.getElementById(id).children;
    for (let i = 0; i < dots.length; i++)
      dots[i].className = 'dash-dot' + (i === state.screen ? ' active' : '');
  });
}

// ── Presets ────────────────────────────────────────────────────────

function presetAllOn() { ICONS.forEach(i => setIconState(i.id, true)); }
function presetAllOff() { ICONS.forEach(i => setIconState(i.id, false)); }

function presetDriveMode() {
  presetAllOff();
  setGear('D');
  setIconState('high_beam', true);
  Object.assign(state.status, { soc: 72.3, voltage: 380.2, current: -45.6, range: 280 });
  updateStatusScreen();
  updateStatusInputs();
}

function presetChargeMode() {
  presetAllOff();
  setGear('P');
  ['ev_charger', 'ccs2', 'arrow_left', 'arrow_right'].forEach(id => setIconState(id, true));
  Object.assign(state.status, { soc: 45.2, voltage: 360.8, current: 32.0, range: 175, cellBalance: 'Balancing' });
  updateStatusScreen();
  updateStatusInputs();
}

function presetFaultMode() {
  presetAllOff();
  ['hvil', 'brake_warn', 'engine', 'hv_warn1', 'hv_warn2', 'thermo_hot', 'abs'].forEach(id => setIconState(id, true));
  Object.assign(state.status, { health: 62, tempFront: 55, voltageDelta: 0.85, cellBalance: 'FAULT' });
  updateStatusScreen();
  updateStatusInputs();
}

function updateStatusInputs() {
  document.querySelectorAll('#statusInputs input').forEach(inp => {
    const key = inp.dataset.key;
    if (key && state.status[key] !== undefined) inp.value = state.status[key];
  });
}

// ── Swipe on preview ──────────────────────────────────────────────

let touchX = 0;
document.querySelector('.screen-frame').addEventListener('pointerdown', e => touchX = e.clientX);
document.querySelector('.screen-frame').addEventListener('pointerup', e => {
  if (Math.abs(e.clientX - touchX) > 30) switchScreen(e.clientX < touchX ? 1 : 0);
});

// ── Init ──────────────────────────────────────────────────────────

buildDashboard();
buildControls();
buildStatusScreen();
</script>
</body>
</html>
