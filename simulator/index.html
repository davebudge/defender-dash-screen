<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Defender Dashboard Simulator</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=DM+Sans:wght@400;500;600;700&display=swap');

  :root {
    --bg: #0a0a0c;
    --panel-bg: #111114;
    --panel-border: #1e1e24;
    --text: #e0e0e6;
    --text-dim: #6a6a78;
    --accent: #ff4d00;
    --red: #ff0000;
    --amber: #ffa500;
    --blue: #0099ff;
    --green: #00ff00;
    --white: #ffffff;
    --icon-off: 0.15;
    --icon-on: 1.0;
    --toggle-bg: #1a1a22;
    --toggle-on: #2a4a2a;
    --section-bg: #0e0e12;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    overflow: hidden;
  }

  /* ── Layout ──────────────────────────────────────────── */

  .simulator {
    display: flex;
    width: 100vw;
    height: 100vh;
    gap: 0;
  }

  .preview-panel {
    flex: 0 0 auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background: #050507;
    border-right: 1px solid var(--panel-border);
    min-width: 380px;
  }

  .preview-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 12px;
  }

  .screen-frame {
    position: relative;
    width: 320px;
    height: 533px;
    border: 2px solid #222228;
    border-radius: 8px;
    overflow: hidden;
    background: #000;
    box-shadow: 0 0 60px rgba(0,0,0,0.8), 0 0 2px rgba(255,255,255,0.03);
  }

  .screen-viewport {
    width: 480px;
    height: 800px;
    transform: scale(0.6667);
    transform-origin: top left;
    position: relative;
    overflow: hidden;
  }

  .screen-slider {
    display: flex;
    width: 960px;
    height: 800px;
    transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .screen-page {
    width: 480px;
    height: 800px;
    flex-shrink: 0;
    background: #000;
    position: relative;
  }

  .screen-nav {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 12px;
  }

  .nav-arrow {
    background: none;
    border: 1px solid #333;
    color: var(--text-dim);
    width: 28px;
    height: 28px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }
  .nav-arrow:hover { border-color: #555; color: var(--text); }

  .nav-dot {
    width: 6px;
    height: 6px;
    border-radius: 3px;
    background: #333;
    transition: all 0.3s;
  }
  .nav-dot.active {
    width: 18px;
    background: var(--text);
  }

  /* ── Control Panel ───────────────────────────────────── */

  .control-panel {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .panel-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--panel-border);
  }

  .panel-header h1 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .panel-header .badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 1px;
    padding: 3px 8px;
    border-radius: 3px;
    background: #1a1a22;
    color: var(--text-dim);
    text-transform: uppercase;
  }

  .section {
    background: var(--section-bg);
    border: 1px solid var(--panel-border);
    border-radius: 6px;
    overflow: hidden;
  }

  .section-header {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-dim);
    padding: 12px 16px 8px;
    border-bottom: 1px solid var(--panel-border);
  }

  .section-body { padding: 12px 16px; }

  /* ── Warning Light Toggles ───────────────────────────── */

  .icon-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4px;
  }

  .icon-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 8px;
    border-radius: 4px;
    cursor: pointer;
    transition: background 0.15s;
    user-select: none;
  }
  .icon-toggle:hover { background: #1a1a22; }

  .toggle-switch {
    width: 32px;
    height: 16px;
    border-radius: 8px;
    background: var(--toggle-bg);
    position: relative;
    flex-shrink: 0;
    transition: background 0.2s;
    border: 1px solid #2a2a32;
  }
  .toggle-switch::after {
    content: '';
    position: absolute;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: #555;
    top: 1px;
    left: 1px;
    transition: all 0.2s;
  }
  .toggle-switch.on { background: var(--toggle-on); border-color: #3a6a3a; }
  .toggle-switch.on::after { left: 17px; background: #5a5; }

  .toggle-switch.on[data-color="red"] { background: #3a1a1a; border-color: #6a2a2a; }
  .toggle-switch.on[data-color="red"]::after { background: var(--red); }
  .toggle-switch.on[data-color="amber"] { background: #3a2a0a; border-color: #6a4a1a; }
  .toggle-switch.on[data-color="amber"]::after { background: var(--amber); }
  .toggle-switch.on[data-color="blue"] { background: #0a2a3a; border-color: #1a4a6a; }
  .toggle-switch.on[data-color="blue"]::after { background: var(--blue); }
  .toggle-switch.on[data-color="green"] { background: #0a3a1a; border-color: #1a6a2a; }
  .toggle-switch.on[data-color="green"]::after { background: var(--green); }

  .toggle-label {
    font-size: 11px;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
  }
  .icon-toggle.active .toggle-label { color: var(--text); }

  /* ── Gear Selector ───────────────────────────────────── */

  .gear-buttons {
    display: flex;
    gap: 4px;
  }

  .gear-btn {
    flex: 1;
    padding: 10px 0;
    background: var(--toggle-bg);
    border: 1px solid #2a2a32;
    border-radius: 4px;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
  }
  .gear-btn:hover { border-color: #444; color: var(--text); }
  .gear-btn.active {
    background: #1a1a2a;
    border-color: var(--white);
    color: var(--white);
    box-shadow: 0 0 12px rgba(255,255,255,0.1);
  }

  /* ── Status Inputs ───────────────────────────────────── */

  .status-inputs {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .status-field {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .status-field label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  .status-field input, .status-field select {
    background: var(--toggle-bg);
    border: 1px solid #2a2a32;
    border-radius: 3px;
    color: var(--text);
    padding: 6px 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    outline: none;
    transition: border-color 0.15s;
  }
  .status-field input:focus, .status-field select:focus { border-color: #555; }

  /* ── Preset Buttons ──────────────────────────────────── */

  .preset-buttons {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .preset-btn {
    padding: 7px 14px;
    background: var(--toggle-bg);
    border: 1px solid #2a2a32;
    border-radius: 4px;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
  }
  .preset-btn:hover { border-color: #555; color: var(--text); background: #1a1a22; }
  .preset-btn.danger { border-color: #3a1a1a; }
  .preset-btn.danger:hover { border-color: #6a2a2a; background: #1a0a0a; color: var(--red); }

  /* ── Dashboard Screen Rendering ──────────────────────── */

  .dash-icon {
    position: absolute;
    width: 64px;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.2s;
  }

  .dash-icon svg {
    width: 48px;
    height: 48px;
  }

  .gear-display {
    position: absolute;
    width: 480px;
    top: 310px;
    height: 160px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .gear-letter {
    font-family: 'JetBrains Mono', monospace;
    font-size: 120px;
    font-weight: 700;
    color: white;
    line-height: 1;
    transition: none;
  }

  .gear-letter.anim-out {
    animation: gearOut 0.2s ease-in forwards;
  }
  .gear-letter.anim-in {
    animation: gearIn 0.2s ease-out forwards;
  }

  @keyframes gearOutLeft {
    from { transform: translateX(0); opacity: 1; }
    to { transform: translateX(-40px); opacity: 0; }
  }
  @keyframes gearOutRight {
    from { transform: translateX(0); opacity: 1; }
    to { transform: translateX(40px); opacity: 0; }
  }
  @keyframes gearInLeft {
    from { transform: translateX(40px); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }
  @keyframes gearInRight {
    from { transform: translateX(-40px); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }

  .dash-nav-dots {
    position: absolute;
    bottom: 10px;
    left: 0;
    width: 480px;
    display: flex;
    justify-content: center;
    gap: 8px;
    align-items: center;
  }

  .dash-dot {
    height: 6px;
    border-radius: 3px;
    background: #333;
    transition: all 0.3s;
  }
  .dash-dot.active { width: 18px; background: white; }
  .dash-dot:not(.active) { width: 6px; }

  /* ── Status Screen ───────────────────────────────────── */

  .status-screen { padding: 0; }

  .status-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px;
    font-weight: 600;
    color: white;
    padding: 20px 24px 12px;
    border-bottom: 1px solid #222;
    letter-spacing: 1px;
  }

  .status-rows {
    padding: 8px 0;
    overflow-y: auto;
    max-height: 700px;
  }

  .status-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 24px;
    border-bottom: 1px solid #161616;
  }

  .status-row-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: #888;
    letter-spacing: 0.5px;
  }

  .status-row-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px;
    font-weight: 600;
    color: white;
  }

  .status-nav-dots {
    position: absolute;
    bottom: 10px;
    left: 0;
    width: 480px;
    display: flex;
    justify-content: center;
    gap: 8px;
    align-items: center;
  }

  /* ── Scrollbar ───────────────────────────────────────── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #2a2a32; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #3a3a42; }
</style>
</head>
<body>

<div class="simulator">
  <!-- Preview Panel -->
  <div class="preview-panel">
    <div class="preview-label">480 × 800 &nbsp;·&nbsp; ESP32-S3 Preview</div>
    <div class="screen-frame">
      <div class="screen-viewport">
        <div class="screen-slider" id="screenSlider">

          <!-- Screen 1: Warning Lights + Gear -->
          <div class="screen-page" id="dashScreen">
            <div id="iconContainer"></div>
            <div class="gear-display" id="gearDisplay">
              <span class="gear-letter" id="gearLetter">P</span>
            </div>
            <div class="dash-nav-dots" id="dashDots"></div>
          </div>

          <!-- Screen 2: Vehicle Status -->
          <div class="screen-page" id="statusScreen">
            <div class="status-title">VEHICLE STATUS</div>
            <div class="status-rows" id="statusRows"></div>
            <div class="status-nav-dots" id="statusDots"></div>
          </div>

        </div>
      </div>
    </div>
    <div class="screen-nav">
      <button class="nav-arrow" onclick="switchScreen(0)">‹</button>
      <div class="nav-dot active" id="extDot0"></div>
      <div class="nav-dot" id="extDot1"></div>
      <button class="nav-arrow" onclick="switchScreen(1)">›</button>
    </div>
  </div>

  <!-- Control Panel -->
  <div class="control-panel">
    <div class="panel-header">
      <h1>CAN Bus Simulator</h1>
      <span class="badge">Defender Puma</span>
    </div>

    <!-- Presets -->
    <div class="section">
      <div class="section-header">Presets</div>
      <div class="section-body">
        <div class="preset-buttons">
          <button class="preset-btn" onclick="presetAllOn()">All On</button>
          <button class="preset-btn" onclick="presetAllOff()">All Off</button>
          <button class="preset-btn" onclick="presetDriveMode()">Drive Mode</button>
          <button class="preset-btn" onclick="presetChargeMode()">Charge Mode</button>
          <button class="preset-btn danger" onclick="presetFaultMode()">Fault Mode</button>
        </div>
      </div>
    </div>

    <!-- Gear Selector -->
    <div class="section">
      <div class="section-header">Gear Selector</div>
      <div class="section-body">
        <div class="gear-buttons" id="gearButtons"></div>
      </div>
    </div>

    <!-- Warning Lights -->
    <div class="section">
      <div class="section-header">Warning Lights</div>
      <div class="section-body">
        <div class="icon-grid" id="iconToggles"></div>
      </div>
    </div>

    <!-- Vehicle Status -->
    <div class="section">
      <div class="section-header">Vehicle Status Data</div>
      <div class="section-body">
        <div class="status-inputs" id="statusInputs"></div>
      </div>
    </div>
  </div>
</div>

<script>
// ── Icon Definitions (matches icon_defs.c) ────────────────────────

const COLORS = { red: '#ff0000', amber: '#ffa500', blue: '#0099ff', green: '#00ff00' };

const ICONS = [

  brake_warn: `<circle cx="24" cy="24" r="18" stroke="currentColor" fill="none" stroke-width="2.5"/><circle cx="24" cy="24" r="12" stroke="currentColor" fill="none" stroke-width="2"/><text x="24" y="29" font-family="monospace" font-size="16" font-weight="bold" fill="currentColor" text-anchor="middle">!</text>`,
  abs: `<circle cx="24" cy="24" r="18" stroke="currentColor" fill="none" stroke-width="2.5"/><circle cx="24" cy="24" r="12" stroke="currentColor" fill="none" stroke-width="2"/><text x="24" y="30" font-family="monospace" font-size="11" font-weight="bold" fill="currentColor" text-anchor="middle">ABS</text>`,
  engine: `<path d="M10 16h6v-4h4v4h8v-4h4v4h6v16h-6v4h-4v-4h-8v4h-4v-4h-6z" stroke="currentColor" fill="none" stroke-width="2"/><rect x="16" y="20" width="4" height="8" fill="currentColor" opacity="0.5"/><rect x="24" y="20" width="4" height="8" fill="currentColor" opacity="0.5"/>`,
  battery: `<rect x="8" y="16" width="32" height="20" rx="2" stroke="currentColor" fill="none" stroke-width="2.5"/><rect x="40" y="22" width="4" height="8" rx="1" fill="currentColor"/><text x="16" y="30" font-size="12" font-weight="bold" fill="currentColor">-</text><text x="30" y="30" font-size="12" font-weight="bold" fill="currentColor">+</text>`,
  ccs2: `<rect x="12" y="8" width="24" height="20" rx="4" stroke="currentColor" fill="none" stroke-width="2"/><circle cx="20" cy="16" r="3" stroke="currentColor" fill="none" stroke-width="1.5"/><circle cx="28" cy="16" r="3" stroke="currentColor" fill="none" stroke-width="1.5"/><circle cx="20" cy="36" r="3" stroke="currentColor" fill="none" stroke-width="1.5"/><circle cx="28" cy="36" r="3" stroke="currentColor" fill="none" stroke-width="1.5"/><path d="M16 28h16" stroke="currentColor" stroke-width="2"/>`,
  traction: `<path d="M12 40l8-16 8 8 8-16" stroke="currentColor" fill="none" stroke-width="2.5"/><text x="24" y="14" font-family="monospace" font-size="11" font-weight="bold" fill="currentColor" text-anchor="middle">TC</text>`,
  thermo_hot: `<path d="M24 8v24" stroke="currentColor" stroke-width="4" stroke-linecap="round"/><circle cx="24" cy="36" r="8" stroke="currentColor" fill="none" stroke-width="2.5"/><circle cx="24" cy="36" r="4" fill="currentColor"/><path d="M32 12l4-2M32 18l4-2M32 24l4-2" stroke="currentColor" stroke-width="1.5"/>`,
  thermo_cold: `<path d="M24 8v24" stroke="currentColor" stroke-width="4" stroke-linecap="round"/><circle cx="24" cy="36" r="8" stroke="currentColor" fill="none" stroke-width="2.5"/><circle cx="24" cy="36" r="4" fill="currentColor"/><path d="M32 14l4 0M30 20l6 0M32 26l4 0" stroke="currentColor" stroke-width="1.5"/>`,
  book: `<path d="M8 8h14c2 0 4 2 4 4v28c-2-2-4-3-6-3H8V8z" stroke="currentColor" fill="none" stroke-width="2"/><path d="M40 8H26c-2 0-4 2-4 4v28c2-2 4-3 6-3h12V8z" stroke="currentColor" fill="none" stroke-width="2"/><circle cx="30" cy="22" r="5" stroke="currentColor" fill="none" stroke-width="1.5"/><path d="M34 26l3 3" stroke="currentColor" stroke-width="1.5"/>`,
  hv_batt: `<rect x="8" y="12" width="32" height="24" rx="2" stroke="currentColor" fill="none" stroke-width="2.5"/><rect x="40" y="20" width="4" height="8" rx="1" fill="currentColor"/><path d="M22 18v12M16 24h12" stroke="currentColor" stroke-width="2"/><path d="M26 6l4 6h-8l4-6z" fill="currentColor"/>`,
  arrow_l: `<path d="M30 12L18 24L30 36" stroke="currentColor" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>`,
  arrow_r: `<path d="M18 12L30 24L18 36" stroke="currentColor" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>`,
};

// ── State ─────────────────────────────────────────────────────────

const state = {
  icons: {},
  gear: 'P',
  screen: 0,
  status: {
    soc: 86.6, voltage: 394.4, current: 8.7,
    tempFront: 28, tempRear: 25, voltageDelta: 0.08,
    cellBalance: 'Good', chargeCycles: 150, health: 95,
    maxDischargeCurrent: 60, range: 320,
    lastCharged: '2023-10-01', nextMaint: '2024-04-01',
    firmware: 'v2.3.1'
  }
};

ICONS.forEach(i => state.icons[i.id] = false);

// ── Grid Layout ───────────────────────────────────────────────────

const CELL_W = 120, CELL_H = 90, ICON_SZ = 64;
const TOP_Y = 10, TOP_ROWS = 3, GAP_Y = 470;

function iconPos(row, col) {
  let baseY, localRow;
  if (row < TOP_ROWS) {
    baseY = TOP_Y;
    localRow = row;
  } else {
    baseY = GAP_Y;
    localRow = row - TOP_ROWS;
  }
  return {
    x: col * CELL_W + (CELL_W - ICON_SZ) / 2,
    y: baseY + localRow * CELL_H + (CELL_H - ICON_SZ) / 2
  };
}

// ── Build Dashboard Icons ─────────────────────────────────────────

function buildDashboard() {
  const container = document.getElementById('iconContainer');
  ICONS.forEach(icon => {
    const pos = iconPos(icon.row, icon.col);
    const div = document.createElement('div');
    div.className = 'dash-icon';
    div.id = `dash-${icon.id}`;
    div.style.left = pos.x + 'px';
    div.style.top = pos.y + 'px';
    div.style.color = COLORS[icon.color];
    div.style.opacity = 0.15;
    div.innerHTML = `<svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">${SVG_ICONS[icon.svg]}</svg>`;
    container.appendChild(div);
  });

  // Build nav dots for both screens
  [['dashDots', 0], ['statusDots', 1]].forEach(([id, activeOnScreen]) => {
    const dotsEl = document.getElementById(id);
    for (let i = 0; i < 2; i++) {
      const dot = document.createElement('div');
      dot.className = 'dash-dot';
      dotsEl.appendChild(dot);
    }
  });
  updateDashDots();
}

// ── Build Controls ────────────────────────────────────────────────

function buildControls() {
  // Icon toggles
  const grid = document.getElementById('iconToggles');
  ICONS.forEach(icon => {
    const toggle = document.createElement('div');
    toggle.className = 'icon-toggle';
    toggle.id = `toggle-${icon.id}`;
    toggle.innerHTML = `<div class="toggle-switch" data-color="${icon.color}"></div><span class="toggle-label">${icon.name}</span>`;
    toggle.onclick = () => toggleIcon(icon.id);
    grid.appendChild(toggle);
  });

  // Gear buttons
  const gearDiv = document.getElementById('gearButtons');
  'PRNDS'.split('').forEach(g => {
    const btn = document.createElement('button');
    btn.className = 'gear-btn' + (g === 'P' ? ' active' : '');
    btn.textContent = g;
    btn.id = `gear-${g}`;
    btn.onclick = () => setGear(g);
    gearDiv.appendChild(btn);
  });

  // Status inputs
  const statusDiv = document.getElementById('statusInputs');
  const fields = [
    { key: 'soc', label: 'State of Charge (%)', type: 'number', step: 0.1 },
    { key: 'voltage', label: 'Battery Voltage (V)', type: 'number', step: 0.1 },
    { key: 'current', label: 'Battery Current (A)', type: 'number', step: 0.1 },
    { key: 'tempFront', label: 'Temp Front (°C)', type: 'number', step: 1 },
    { key: 'tempRear', label: 'Temp Rear (°C)', type: 'number', step: 1 },
    { key: 'voltageDelta', label: 'Voltage Delta (V)', type: 'number', step: 0.01 },
    { key: 'cellBalance', label: 'Cell Balance', type: 'text' },
    { key: 'chargeCycles', label: 'Charge Cycles', type: 'number', step: 1 },
    { key: 'health', label: 'Battery Health (%)', type: 'number', step: 1 },
    { key: 'maxDischargeCurrent', label: 'Max Discharge (A)', type: 'number', step: 1 },
    { key: 'range', label: 'Range (km)', type: 'number', step: 1 },
    { key: 'lastCharged', label: 'Last Charged', type: 'date' },
    { key: 'nextMaint', label: 'Next Maint', type: 'date' },
    { key: 'firmware', label: 'Firmware', type: 'text' },
  ];

  fields.forEach(f => {
    const div = document.createElement('div');
    div.className = 'status-field';
    div.innerHTML = `<label>${f.label}</label><input type="${f.type}" value="${state.status[f.key]}" ${f.step ? `step="${f.step}"` : ''} data-key="${f.key}">`;
    div.querySelector('input').oninput = (e) => {
      state.status[f.key] = f.type === 'number' ? parseFloat(e.target.value) || 0 : e.target.value;
      updateStatusScreen();
    };
    statusDiv.appendChild(div);
  });
}

// ── Build Status Screen ───────────────────────────────────────────

function buildStatusScreen() {
  const rows = document.getElementById('statusRows');
  const labels = [
    ['soc', 'STATE OF CHARGE', v => v.toFixed(1) + '%'],
    ['voltage', 'BATTERY VOLTAGE', v => v.toFixed(1) + 'V'],
    ['current', 'BATTERY CURRENT', v => v.toFixed(1) + 'A'],
    ['tempFront', 'BATTERY TEMP FRONT', v => v + '°C'],
    ['tempRear', 'BATTERY TEMP REAR', v => v + '°C'],
    ['voltageDelta', 'BATTERY PACK VOLTAGE DELTA', v => v.toFixed(2) + 'V'],
    ['cellBalance', 'CELL BALANCE', v => v],
    ['chargeCycles', 'CHARGE CYCLES', v => v],
    ['health', 'BATTERY HEALTH', v => v + '%'],
    ['maxDischargeCurrent', 'MAX DISCHARGE CURRENT', v => v + 'A'],
    ['range', 'ESTIMATED REMAINING RANGE', v => v + '  km'],
    ['lastCharged', 'LAST CHARGED DATE', v => v],
    ['nextMaint', 'NEXT MAINTENANCE DUE', v => v],
    ['firmware', 'FIRMWARE VERSION', v => v],
  ];

  labels.forEach(([key, label, fmt]) => {
    const row = document.createElement('div');
    row.className = 'status-row';
    row.innerHTML = `<span class="status-row-label">${label}</span><span class="status-row-value" id="sv-${key}">${fmt(state.status[key])}</span>`;
    rows.appendChild(row);
  });
}

function updateStatusScreen() {
  const fmts = {
    soc: v => v.toFixed(1) + '%',
    voltage: v => v.toFixed(1) + 'V',
    current: v => v.toFixed(1) + 'A',
    tempFront: v => v + '°C',
    tempRear: v => v + '°C',
    voltageDelta: v => v.toFixed(2) + 'V',
    cellBalance: v => v,
    chargeCycles: v => v,
    health: v => v + '%',
    maxDischargeCurrent: v => v + 'A',
    range: v => v + '  km',
    lastCharged: v => v,
    nextMaint: v => v,
    firmware: v => v,
  };
  Object.keys(fmts).forEach(k => {
    const el = document.getElementById(`sv-${k}`);
    if (el) el.textContent = fmts[k](state.status[k]);
  });
}

// ── Icon Toggle ───────────────────────────────────────────────────

function toggleIcon(id) {
  state.icons[id] = !state.icons[id];
  updateIcon(id);
}

function setIconState(id, on) {
  state.icons[id] = on;
  updateIcon(id);
}

function updateIcon(id) {
  const on = state.icons[id];
  const dashEl = document.getElementById(`dash-${id}`);
  const toggleEl = document.getElementById(`toggle-${id}`);

  if (dashEl) dashEl.style.opacity = on ? 1.0 : 0.15;
  if (toggleEl) {
    const sw = toggleEl.querySelector('.toggle-switch');
    sw.classList.toggle('on', on);
    toggleEl.classList.toggle('active', on);
  }
}

// ── Gear Selector ─────────────────────────────────────────────────

function setGear(g) {
  if (g === state.gear) return;
  const oldGear = state.gear;
  const gears = 'PRNDS';
  const oldIdx = gears.indexOf(oldGear);
  const newIdx = gears.indexOf(g);
  const goingRight = newIdx > oldIdx;

  // Update buttons
  document.querySelectorAll('.gear-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`gear-${g}`).classList.add('active');

  // Animate
  const display = document.getElementById('gearDisplay');
  const oldLetter = document.getElementById('gearLetter');

  // Animate out
  oldLetter.style.animation = `gearOut${goingRight ? 'Left' : 'Right'} 0.2s ease-in forwards`;

  setTimeout(() => {
    oldLetter.textContent = g;
    oldLetter.style.animation = `gearIn${goingRight ? 'Left' : 'Right'} 0.2s ease-out forwards`;
    setTimeout(() => { oldLetter.style.animation = ''; }, 200);
  }, 180);

  state.gear = g;
}

// ── Screen Navigation ─────────────────────────────────────────────

function switchScreen(idx) {
  state.screen = idx;
  document.getElementById('screenSlider').style.transform = `translateX(-${idx * 480}px)`;

  // External dots
  document.getElementById('extDot0').className = 'nav-dot' + (idx === 0 ? ' active' : '');
  document.getElementById('extDot1').className = 'nav-dot' + (idx === 1 ? ' active' : '');

  updateDashDots();
}

function updateDashDots() {
  ['dashDots', 'statusDots'].forEach(id => {
    const dots = document.getElementById(id).children;
    for (let i = 0; i < dots.length; i++) {
      dots[i].className = 'dash-dot' + (i === state.screen ? ' active' : '');
    }
  });
}

// ── Presets ────────────────────────────────────────────────────────

function presetAllOn() {
  ICONS.forEach(i => setIconState(i.id, true));
}

function presetAllOff() {
  ICONS.forEach(i => setIconState(i.id, false));
}

function presetDriveMode() {
  presetAllOff();
  setGear('D');
  setIconState('high_beam', true);
  state.status.soc = 72.3;
  state.status.voltage = 380.2;
  state.status.current = -45.6;
  state.status.range = 280;
  updateStatusScreen();
  updateStatusInputs();
}

function presetChargeMode() {
  presetAllOff();
  setGear('P');
  setIconState('ev_charger', true);
  setIconState('ccs2', true);
  setIconState('arrow_left', true);
  setIconState('arrow_right', true);
  state.status.soc = 45.2;
  state.status.voltage = 360.8;
  state.status.current = 32.0;
  state.status.range = 175;
  state.status.cellBalance = 'Balancing';
  updateStatusScreen();
  updateStatusInputs();
}

function presetFaultMode() {
  presetAllOff();
  ['hvil', 'brake_warn', 'engine', 'hv_warn1', 'hv_warn2', 'thermo_hot', 'abs'].forEach(id => setIconState(id, true));
  state.status.health = 62;
  state.status.tempFront = 55;
  state.status.voltageDelta = 0.85;
  state.status.cellBalance = 'FAULT';
  updateStatusScreen();
  updateStatusInputs();
}

function updateStatusInputs() {
  document.querySelectorAll('#statusInputs input').forEach(inp => {
    const key = inp.dataset.key;
    if (key && state.status[key] !== undefined) {
      inp.value = state.status[key];
    }
  });
}

// ── Touch/swipe support on preview ────────────────────────────────

let touchStartX = 0;
document.querySelector('.screen-frame').addEventListener('pointerdown', e => { touchStartX = e.clientX; });
document.querySelector('.screen-frame').addEventListener('pointerup', e => {
  const dx = e.clientX - touchStartX;
  if (Math.abs(dx) > 30) {
    switchScreen(dx < 0 ? 1 : 0);
  }
});

// ── Init ──────────────────────────────────────────────────────────

buildDashboard();
buildControls();
buildStatusScreen();
</script>
</body>
</html>
